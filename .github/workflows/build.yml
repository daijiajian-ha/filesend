name: Build FileSend

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - macos
          - linux
          - all

jobs:
  build:
    runs-on: ${{ inputs.platform == 'macos' && 'macos-latest' || inputs.platform == 'linux' && 'ubuntu-22.04' || 'windows-latest' }}
    defaults:
      run:
        shell: bash
    
    steps:
      - name: Checkout custom files
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Clone LocalSend source
        run: |
          rm -rf app
          git clone --depth=1 https://github.com/localsend/localsend.git app
          cd app && git clone --depth=1 https://github.com/localsend/common.git common && git clone --depth=1 https://github.com/localsend/protocol.git protocol

      - name: Apply custom modifications
        run: |
          cp -r modified/app/lib/service app/app/lib/
          if ! grep -q "archive:" app/app/pubspec.yaml; then
            sed -i '/dependencies:/a\  archive: ^3.4.0' app/app/pubspec.yaml
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd app/app
          flutter pub get

      - name: Build for Windows
        if: inputs.platform == 'windows' || inputs.platform == 'all'
        run: |
          cd app/app
          flutter build windows --release

      - name: Build for macOS
        if: inputs.platform == 'macos' || inputs.platform == 'all'
        run: |
          cd app/app
          flutter build macos --release

      - name: Build for Linux
        if: inputs.platform == 'linux' || inputs.platform == 'all'
        run: |
          cd app/app
          flutter build linux --release

      - name: Upload Windows build
        if: inputs.platform == 'windows' || inputs.platform == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: filesend-windows
          path: app/app/build/windows/runner/Release/*.exe
          retention-days: 5

      - name: Upload macOS build
        if: inputs.platform == 'macos' || inputs.platform == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: filesend-macos
          path: app/app/build/macos/Build/Products/Release/*.app
          retention-days: 5

      - name: Upload Linux build
        if: inputs.platform == 'linux' || inputs.platform == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: filesend-linux
          path: app/app/build/linux/*/release/bundle/*
          retention-days: 5
